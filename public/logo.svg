<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="#1e40af"/>

  <!-- Dashboard face -->
  <rect x="0" y="0" width="100" height="56" rx="22" fill="#2563eb"/>
  <rect x="0" y="34" width="100" height="22" fill="#2563eb"/>

  <!-- Glove box inset shadow -->
  <rect x="12" y="16" width="76" height="38" rx="5" fill="#1e3a8a"/>

  <!-- Glove box interior -->
  <rect x="13" y="17" width="74" height="36" rx="4" fill="#1e40af"/>

  <!-- Document lines -->
  <rect x="21" y="25" width="34" height="3.5" rx="1.75" fill="white" fill-opacity="0.95"/>
  <rect x="21" y="32" width="24" height="3.5" rx="1.75" fill="white" fill-opacity="0.65"/>
  <rect x="21" y="39" width="29" height="3.5" rx="1.75" fill="white" fill-opacity="0.4"/>

  <!-- Small wrench icon (service) top-right of compartment -->
  <g transform="translate(62,24) rotate(45)" fill="white" fill-opacity="0.35">
    <rect x="-2" y="-8" width="4" height="16" rx="2"/>
    <rect x="-5" y="-10" width="10" height="5" rx="2.5"/>
    <rect x="-5" y="5" width="10" height="5" rx="2.5"/>
  </g>

  <!-- Compartment border highlight -->
  <rect x="13" y="17" width="74" height="36" rx="4" fill="none" stroke="white" stroke-opacity="0.12" stroke-width="1.5"/>

  <!-- Open door hanging down -->
  <rect x="12" y="54" width="76" height="26" rx="0 0 6 6" fill="#3b82f6"/>
  <rect x="12" y="54" width="76" height="26" rx="0 0 6 6" fill="none" stroke="white" stroke-opacity="0.15" stroke-width="1.5"/>

  <!-- Door texture lines -->
  <line x1="20" y1="63" x2="80" y2="63" stroke="white" stroke-opacity="0.15" stroke-width="1.5"/>
  <line x1="20" y1="70" x2="80" y2="70" stroke="white" stroke-opacity="0.1" stroke-width="1"/>

  <!-- Latch button -->
  <circle cx="50" cy="54" r="5.5" fill="#1e40af"/>
  <circle cx="50" cy="54" r="3.5" fill="white" fill-opacity="0.85"/>
  <circle cx="50" cy="54" r="1.5" fill="#1e40af"/>
</svg>
