<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#1e40af"/>
  <!-- Dashboard face -->
  <rect x="0" y="0" width="32" height="18" rx="7" fill="#2563eb"/>
  <rect x="0" y="11" width="32" height="7" fill="#2563eb"/>
  <!-- Glove box inset -->
  <rect x="4" y="5" width="24" height="12" rx="2" fill="#1e3a8a"/>
  <!-- Document lines -->
  <rect x="6.5" y="8" width="11" height="2" rx="1" fill="white" fill-opacity="0.95"/>
  <rect x="6.5" y="11.5" width="7.5" height="2" rx="1" fill="white" fill-opacity="0.6"/>
  <!-- Open door -->
  <rect x="4" y="17" width="24" height="9" rx="0 0 3 3" fill="#3b82f6"/>
  <!-- Latch -->
  <circle cx="16" cy="17" r="2" fill="#1e40af"/>
  <circle cx="16" cy="17" r="1.2" fill="white" fill-opacity="0.85"/>
</svg>
