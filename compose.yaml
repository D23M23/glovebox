services:
  app:
    build:
      context: .
      args:
        # Baked into the frontend bundle at build time
        VITE_APP_TITLE: ${VITE_APP_TITLE:-GloveBox}
    ports:
      - "${APP_PORT:-7070}:80"
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: ./server
    environment:
      # Set JWT_SECRET as a Secret variable in Dockhand (never written to disk)
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
      DATA_DIR: /app/data
    volumes:
      - glovebox_data:/app/data
    restart: unless-stopped

volumes:
  glovebox_data:
